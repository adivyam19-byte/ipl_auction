<!DOCTYPE html>
<html>

<head>

<title>IPL Auction Dashboard</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6f8;
margin:0;
padding:0;
text-align:center;
}

h1{
background:#1e3a8a;
color:white;
padding:20px;
margin:0;
}

table{
margin:30px auto;
border-collapse:collapse;
width:90%;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

th{
background:#2563eb;
color:white;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f1f5f9;
}

input{
padding:6px;
border:1px solid #ccc;
border-radius:4px;
width:120px;
}

button{
background:#16a34a;
color:white;
border:none;
padding:7px 14px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#15803d;
}

.category{
font-weight:bold;
color:#0f172a;
}

.price{
color:#dc2626;
font-weight:bold;
}

</style>

</head>

<body>

<h1>🏏 IPL Auction Dashboard</h1>

<table>

<tr>
<th>Player</th>
<th>Team</th>
<th>Category</th>
<th>Base Price</th>
<th>Current Bid</th>
<th>Place Bid</th>
</tr>

{% for p in players %}

<tr>

<td>{{p[1]}}</td>

<td>{{p[2]}}</td>

<td class="category">{{p[3]}}</td>

<td class="price">₹{{p[4]}}</td>

<td class="price">₹{{ p[5] if p[5] else p[4] }}</td>

<td>

<form action="/bid/{{p[0]}}" method="post">

<input
type="number"
name="bid"
min="{{ (p[5] if p[5] else p[4]) + 1 }}"
placeholder="Min {{ (p[5] if p[5] else p[4]) + 1 }}"
required
>

<button type="submit">Bid</button>

</form>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
