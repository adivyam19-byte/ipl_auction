<!DOCTYPE html>
<html>

<head>

<title>IPL Auction</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
text-align:center;
}

h1{
background:#1e3a8a;
color:white;
padding:15px;
}

table{
margin:auto;
border-collapse:collapse;
width:90%;
background:white;
}

th{
background:#2563eb;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f1f5f9;
}

button{
background:#16a34a;
color:white;
border:none;
padding:6px 12px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#15803d;
}

input{
padding:5px;
}

</style>

</head>

<body>

<h1>IPL Auction Dashboard</h1>

<table>

<tr>
<th>Player</th>
<th>Team</th>
<th>Category</th>
<th>Base Price</th>
<th>Current Bid</th>
<th>Bid</th>
</tr>

{% for p in players %}

<tr>

<td>{{p[1]}}</td>
<td>{{p[2]}}</td>
<td>{{p[3]}}</td>
<td>{{p[4]}}</td>
<td>{{p[5]}}</td>

<td>

<form action="/bid/{{p[0]}}" method="post">

<input
type="number"
name="bid"
min="{{p[5] + 1}}"
placeholder="Min {{p[5]+1}}"
required>

<button>Bid</button>

</form>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
